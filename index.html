<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Precitech Task Management</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    /* Custom Styles for Interactivity */
    .fade-in { animation: fadeIn 0.5s ease-in; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    
    .slide-in { animation: slideIn 0.3s ease-out; }
    @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    /* Fix 1: Login Background Gradient as per your image */
    .login-bg { 
      background: linear-gradient(135deg, #d34e24 0%, #ff6929 50%, #e65c25 100%); 
    }

    .modal-overlay { background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(2px); }
    .section { display: block; }
    .hidden { display: none !important; }
    
    /* Fix 2: Active Nav Styling as per your requirement */
    .nav-btn.active { 
      background-color: #FF6929 !important; 
      color: #630f0f !important; 
      border-right: 4px solid #630f0f !important; 
    }
  </style>
</head>
<body class="bg-gray-50">

<div id="login-page" class="min-h-screen login-bg flex items-center justify-center p-4">
  <div class="w-full max-w-sm">
    <div class="bg-white rounded-[2.5rem] shadow-2xl p-10 fade-in">
      
      <div class="flex justify-center mb-6">
        <div class="bg-white border border-gray-200 rounded-lg px-3 py-1.5 flex items-center gap-2 shadow-sm">
           <div class="bg-orange-600 text-white text-[10px] font-bold p-1 rounded-md">TP</div>
           <div class="text-left">
             <p class="text-[11px] font-black text-gray-800 leading-none uppercase">Precitech</p>
             <p class="text-[7px] font-bold text-gray-500 uppercase tracking-tighter">Turnings Pvt. Ltd.</p>
           </div>
        </div>
      </div>

      <div class="text-center mb-8">
        <h1 class="text-2xl font-extrabold text-gray-800">Precitech Tasks</h1>
        <p class="text-gray-400 text-xs mt-1">Sign in to your account</p>
      </div>
      
      <div class="space-y-5">
        <div>
          <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Email Address</label>
          <input type="email" id="login-email" placeholder="yourname@precitech1981.com" 
            class="w-full bg-white border border-orange-200 text-gray-900 text-sm rounded-xl py-3.5 px-4 focus:ring-2 focus:ring-orange-500 outline-none transition-all">
        </div>
        
        <div>
          <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Password</label>
          <input type="password" id="login-password" placeholder="Enter password" 
            class="w-full bg-white border border-gray-100 text-gray-900 text-sm rounded-xl py-3.5 px-4 focus:ring-2 focus:ring-orange-500 outline-none transition-all">
        </div>
        
        <button onclick="doLogin()" class="w-full text-white font-bold py-4 rounded-xl text-sm transition-all hover:brightness-110 active:scale-95 shadow-lg shadow-orange-100"
          style="background: #ef6c33;">
          <i class="fa-solid fa-sign-in-alt mr-2"></i> Sign In
        </button>
      </div>
      
      <div class="mt-8 text-center text-[10px] text-gray-400 font-medium">
        <p>Contact admin to register your account</p>
      </div>
    </div>
  </div>
</div>

<div id="main-app" class="hidden h-screen flex bg-gray-100">
  <div id="sidebar" class="w-64 bg-white border-r border-gray-200 flex flex-col shadow-sm">
    <div class="p-4 border-b border-gray-100">
      <h2 class="font-bold text-gray-800 text-lg">Precitech</h2>
      <p class="text-xs text-gray-400">Task Manager</p>
    </div>
    <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto">
      <button onclick="showSection('dashboard')" id="nav-dashboard" class="nav-btn active w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition text-gray-600 hover:bg-orange-50">
        <i class="fa-solid fa-gauge-high w-5 text-center"></i> Dashboard
      </button>
      </nav>
  </div>
</div>

<script>
  function doLogin() {
    document.getElementById('login-page').classList.add('hidden');
    document.getElementById('main-app').classList.remove('hidden');
  }
</script>

</body>
</html>
